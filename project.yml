name: MandalartSync

options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_NAME: MandalartSync
    PRODUCT_BUNDLE_IDENTIFIER: com.example.mandalartsync
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  MandalartSync:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/MandalartSync
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ios/MandalartSync/Info.plist
