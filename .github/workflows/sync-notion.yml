name: Sync GitHub Issue to Notion

on:
  workflow_dispatch:
    inputs:
      issue_title:
        description: GitHub Issue title
        required: true
        type: string
      issue_state:
        description: GitHub Issue state
        required: true
        type: choice
        default: open
        options:
          - open
          - closed
      issue_url:
        description: GitHub Issue URL
        required: true
        type: string
  issues:
    types: [opened, edited, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "notion-client<3"
          pip show notion-client # Installed notion-client version check

      - name: Run Notion Sync Script
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GITHUB_ISSUE_TITLE: ${{ github.event.issue.title || inputs.issue_title }}
          GITHUB_ISSUE_STATE: ${{ github.event.issue.state || inputs.issue_state }}
          GITHUB_ISSUE_URL: ${{ github.event.issue.html_url || inputs.issue_url }}
        run: python .github/workflows/sync_notion.py
